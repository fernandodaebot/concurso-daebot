<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minijuego Torneo</title>

<style>
body{
  margin:0;
  text-align:center;
  background:#1a1a1a;
  color:white;
  font-family:Arial;
}

canvas{
  display:block;
  margin:auto;
  background:#6ec1ff;
  width:100%;
  max-width:700px;
}

#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.75);
  flex-direction:column;
  z-index:10;
}

#btnSalto{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  max-width:400px;
  padding:22px;
  font-size:24px;
  border:none;
  border-radius:15px;
  background:#ffcc00;
  z-index:30;
}
</style>
</head>

<body>

<h2>🎮 MINIJUEGO DE FERNANDO DAEBOT 🎮</h2>
<div>❤️ <span id="vidasUI"></span> | ⭐ <span id="puntosUI">0</span></div>

<div id="overlay">
<h2 id="mensaje">📱 TOCA SALTAR PARA JUGAR</h2>
</div>

<canvas id="game" width="700" height="300"></canvas>
<button id="btnSalto">SALTAR</button>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let suelo=240;
let y=200, vy=0;

let gravedad=0.8;

let saltoBajo=-8;
let saltoAlto=-15;

let saltos=0;

let velocidad=4;
let puntos=0;
let vidas=4;

let estado="pausa";

let tortugas=[];
let ultimoSpawn=0;
let tiempoInicio=Date.now();

// CONTROL TOQUE LIMPIO
let puedeTocar=true;

let btn=document.getElementById("btnSalto");

btn.addEventListener("touchstart", (e)=>{
  e.preventDefault();
  if(!puedeTocar) return;
  puedeTocar=false;
  accionSalto();
});

btn.addEventListener("touchend", ()=>{
  puedeTocar=true;
});

// PC
btn.addEventListener("click", accionSalto);
document.addEventListener("keydown",e=>{
  if(e.code==="Space") accionSalto();
});

function accionSalto(){
  if(estado==="pausa"){
    estado="jugando";
    overlay.style.display="none";
    return;
  }

  if(estado==="jugando"){
    if(saltos === 0){
      vy = saltoBajo;
      saltos = 1;
    }
    else if(saltos === 1){
      vy = saltoAlto;
      saltos = 2;
    }
  }
}

function player(){
  ctx.fillStyle="#2ecc71";
  ctx.fillRect(100,y,24,18);
}

function drawTortuga(t){
  ctx.fillStyle="green";
  ctx.fillRect(t.x,t.y,26,14);
}

function actualizarVelocidad(){
  let tiempo=(Date.now()-tiempoInicio)/1000;

  if(tiempo < 30){
    velocidad = 3 + tiempo * 0.04;
  }else if(tiempo < 60){
    velocidad = 4.2 + (tiempo-30) * 0.2;
  }else{
    velocidad = 10 + (tiempo-60) * 0.3;
  }

  if(velocidad > 28) velocidad = 28;
}

function generar(){
  let t=Date.now();
  let tiempo=(Date.now()-tiempoInicio)/1000;

  let delay;

  if(tiempo < 30){
    delay = 900;
  }else if(tiempo < 60){
    delay = 450;
  }else{
    delay = 220;
  }

  if(t - ultimoSpawn < delay) return;

  tortugas.push({
    x:700,
    y:suelo-15
  });

  ultimoSpawn = t;
}

function loop(){

  ctx.clearRect(0,0,700,300);

  ctx.fillStyle="#6ec1ff";
  ctx.fillRect(0,0,700,300);

  ctx.fillStyle="#7a4b2b";
  ctx.fillRect(0,suelo,700,60);

  if(estado==="jugando"){

    actualizarVelocidad();

    vy+=gravedad;
    y+=vy;

    if(y>suelo-20){
      y=suelo-20;
      vy=0;
      saltos=0;
    }

    generar();

    tortugas.forEach((t,i)=>{
      t.x-=velocidad;

      drawTortuga(t);

      if(
        t.x < 120 &&
        t.x + 26 > 100 &&
        y + 20 > t.y &&
        y < t.y + 14
      ){
        if(vy > 0 && y < t.y){
          puntos++;
          vy=-10;
          tortugas.splice(i,1);
        }else{
          morir();
        }
      }

      if(t.x < -30) tortugas.splice(i,1);
    });
  }

  player();

  puntosUI.innerText=puntos;
  vidasUI.innerText="❤️".repeat(Math.max(0, vidas));

  requestAnimationFrame(loop);
}

function morir(){
  vidas--;

  if(vidas <= 0){
    estado="pausa";
    overlay.style.display="flex";
    mensaje.innerText="🏆 FIN\nPuntos: "+puntos;
    return;
  }

  estado="pausa";
  overlay.style.display="flex";
  mensaje.innerText="💀 Perdiste - toca SALTAR";

  y=200;
  vy=0;
  saltos=0;
  tortugas=[];

  velocidad=4;
  tiempoInicio=Date.now();
}

loop();
</script>

</body>
</html>
