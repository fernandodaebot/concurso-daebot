<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego</title>

<style>
body{
  margin:0;
  text-align:center;
  background:#111;
  color:white;
  font-family:Arial;
}

canvas{
  background:#6ec1ff;
  width:100%;
  max-width:700px;
}

#btn{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  padding:20px;
  font-size:24px;
  background:#ffcc00;
  border:none;
  border-radius:10px;
}

#overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
}
</style>
</head>

<body>

<h3>🎮 MINIJUEGO 🎮</h3>
<div>❤️ <span id="vidasUI"></span> | ⭐ <span id="puntosUI">0</span></div>

<div id="overlay">TOCA EL BOTÓN PARA JUGAR</div>

<canvas id="game" width="700" height="300"></canvas>

<button id="btn">SALTAR</button>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let y=200, vy=0;
let suelo=240;
let gravedad=0.8;
let salto=-12;

let estado="pausa";
let saltos=0;

let vidas=9;
let puntos=0;

let tortugas=[];

// BOTÓN
let btn=document.getElementById("btn");

btn.onclick=accion;
btn.ontouchstart=accion;

document.addEventListener("keydown",e=>{
  if(e.code==="Space") accion();
});

function accion(){
  if(estado==="pausa"){
    estado="jugando";
    overlay.style.display="none";
  }else{
    if(saltos<2){
      vy=salto;
      saltos++;
    }
  }
}

// JUGADOR
function player(){
  ctx.fillStyle="green";
  ctx.fillRect(100,y,25,20);
}

// TORTUGA
function tortuga(t){
  ctx.fillStyle="green";
  ctx.fillRect(t.x,t.y,25,15);
}

// GENERAR
setInterval(()=>{
  if(estado==="jugando"){
    tortugas.push({x:700,y:suelo-15});
  }
},1000);

// LOOP
function loop(){

  ctx.clearRect(0,0,700,300);

  ctx.fillStyle="#6ec1ff";
  ctx.fillRect(0,0,700,300);

  ctx.fillStyle="brown";
  ctx.fillRect(0,suelo,700,60);

  if(estado==="jugando"){

    vy+=gravedad;
    y+=vy;

    if(y>suelo-20){
      y=suelo-20;
      vy=0;
      saltos=0;
    }

    tortugas.forEach((t,i)=>{
      t.x-=5;

      tortuga(t);

      if(
        t.x<120 && t.x+25>100 &&
        y+20>t.y && y<t.y+15
      ){
        if(vy>0){
          puntos++;
          vy=-8;
          tortugas.splice(i,1);
        }else{
          vidas--;
          estado="pausa";
          overlay.innerText="PERDISTE - TOCA PARA SEGUIR";
          overlay.style.display="flex";
          tortugas=[];
        }
      }
    });
  }

  player();

  puntosUI.innerText=puntos;
  vidasUI.innerText="❤️".repeat(vidas);

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
