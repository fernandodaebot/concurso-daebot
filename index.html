<!DOCTYPE html>
<html>
<head>

<style>
body{
  margin:0;

canvas{
  display:block;
  margin:auto;
  background:#6ec1ff;
  width:100%;
  max-width:700px;
  height:auto;
}

#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;

  justify-content:center;

  background:rgba(0,0,0,0.8);

  z-index:10;
}

#formAlias, #formCel, #formMensaje{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
  z-index:20;
}

input{padding:12px;margin:8px;font-size:16px;}
button{padding:12px 20px;font-size:16px;}

#btnSalto{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  max-width:400px;
  padding:20px;
  font-size:24px;
  border:none;
  border-radius:15px;
  background:#ffcc00;
  z-index:30;
}
</style>
</head>
